version: '3.8'



services:

  web:

    image: ${CI_REGISTRY_IMAGE:-devsecops-web-image}:latest

    container_name: devsecops-web-container

    ports:

      - "5000:5000"

    networks:

      - devsecops_net

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]

      interval: 10s

      timeout: 5s

      retries: 5



  sonarqube:

    image: sonarqube:lts-community

    container_name: devsecops-sonarqube

    ports:

      - "9000:9000"

    networks:

      - devsecops_net

    environment:

      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true

    volumes:

      - sonarqube_data:/opt/sonarqube/data

      - sonarqube_extensions:/opt/sonarqube/extensions

      - sonarqube_logs:/opt/sonarqube/logs



volumes:

  sonarqube_data:

  sonarqube_extensions:

  sonarqube_logs:



networks:

  devsecops_net:
    name: devsecops_net
    driver: bridge