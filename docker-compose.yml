services:
  web:
    build: ./src/app
    container_name: devsecops_web
    ports:
      - "5000:5000"

  sonarqube:
    image: sonarqube:lts-community
    container_name: devsecops_sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: devsecops_zap
    command: ["zap.sh", "-daemon", "-host", "0.0.0.0", "-port", "8080"]
    ports:
      - "8080:8080"
