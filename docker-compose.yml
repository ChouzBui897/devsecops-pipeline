version: '3.8'

services:
  web:
    build: ./src/app
    image: ${CI_REGISTRY_IMAGE}:latest
    container_name: devsecops_web_container
    ports:
      - "5000:5000"
    networks:
      - devsecops_net
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-default_secret_for_now} 
    
    volumes:
      - sqlite_data:/app/instance
      - app_logs:/var/log/app
    
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sonarqube:
    image: sonarqube:lts-community
    container_name: devsecops_sonarqube
    ports:
      - "9000:9000"
    networks:
      - devsecops_net
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  sqlite_data:
  app_logs:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  devsecops_net:
    driver: bridge

