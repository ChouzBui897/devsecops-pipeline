{% extends "base.html" %}
{% block content %}
  <h2 class="h2">Login</h2>

  {% if message %}
    <div class="alert">{{ message }}</div>
  {% endif %}

  <form method="post" class="form">
    <div class="field">
      <label>Username</label>
      <input name="username" placeholder="admin" />
    </div>

    <div class="field">
      <label>Password</label>
      <input name="password" type="password" placeholder="admin123" />
    </div>

    <button class="btn" type="submit">Sign in</button>
  </form>

  <div class="note">
    <b>Intentional vulnerability:</b> route này cố tình dùng query nối chuỗi để tạo <b>SQL Injection</b>.
    <div class="codeblock">
      Payload gợi ý: <code>admin' OR '1'='1' --</code>
    </div>
  </div>
{% endblock %}
