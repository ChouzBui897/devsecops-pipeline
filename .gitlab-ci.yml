stages:
  - build
  - test
  - sast
  - docker-build
  - image-scan
  - deploy
  - dast

build:
  image: python:3.10-slim
  stage: build
  before_script:
    - cd src/app
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - python -m py_compile app.py

test:
  image: python:3.10-slim
  stage: test
  before_script:
    - cd src/app
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - python app.py &
    - sleep 3
    - python -c "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:5000/health').read().decode())"

sonarqube-check:
  stage: sast
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  script:
    - sonar-scanner -Dsonar.projectKey=devsecops-flask-web -Dsonar.sources=src/app -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN
  allow_failure: true

docker-build:
  image: docker:24
  stage: docker-build
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" ./src/app
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi

trivy-scan:
  stage: image-scan
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

deploy-staging:
  stage: deploy
  tags:
    - shell
  script:
    - docker compose up -d web
    - echo "Ứng dụng đã được Ops triển khai thành công."

zap-scan:
  stage: dast
  image: ghcr.io/zaproxy/zaproxy:stable
  script:
    - mkdir -p zap_reports
    - zap-baseline.py -t http://localhost:5000 -r zap_report.html
  artifacts:
    paths:
      - zap_report.html