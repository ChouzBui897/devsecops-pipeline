stages:
  - build
  - test
  - docker-build

# 1) BUILD: kiểm tra python + cài deps + check syntax
build:
  image: python:3.10-slim
  stage: build
  before_script:
    - cd src/app
    - python -V
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - python -m py_compile app.py

# 2) TEST: smoke test /health (không cần pytest)
test:
  image: python:3.10-slim
  stage: test
  before_script:
    - cd src/app
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - python app.py &
    - sleep 3
    - python -c "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:5000/health').read().decode())"

# 3) DOCKER BUILD + PUSH lên GitLab Container Registry
docker-build:
  image: docker:24
  stage: docker-build
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" ./src/app
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
