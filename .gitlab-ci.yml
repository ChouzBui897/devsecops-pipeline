stages:
  - build
  - test
  - sast
  - docker-build
  - image-scan
  - deploy
  - dast

build:
  image: python:3.10-slim
  stage: build
  script:
    - cd src/app
    - pip install -r requirements.txt
    - python -m py_compile app.py

test:
  image: python:3.10-slim
  stage: test
  script:
    - cd src/app
    - pip install -r requirements.txt
    - python app.py &
    - sleep 3
    - python -c "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:5000/health').read().decode())"

sonarqube-check:
  stage: sast
  tags:
    - shell
  script:
    - docker run --rm -v "${CI_PROJECT_DIR}:/usr/src" sonarsource/sonar-scanner-cli "-Dsonar.projectKey=devsecops-flask-web" "-Dsonar.sources=src/app" "-Dsonar.host.url=$SONAR_HOST_URL" "-Dsonar.login=$SONAR_TOKEN"
  allow_failure: true

docker-build:
  image: docker:24
  stage: docker-build
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" ./src/app
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

trivy-scan:
  stage: image-scan
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker run --rm aquasec/trivy:latest image --severity HIGH,CRITICAL "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

deploy-staging:
  stage: deploy
  tags:
    - shell
  script:
    - docker compose up -d web
    - echo "Deploy thành công"

zap-scan:
  stage: dast
  tags:
    - shell
  script:
    - mkdir -p zap_reports
    - sleep 10
    - docker run --rm -v $(pwd)/zap_reports:/zap/wrk ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://192.168.1.239:5000 -r zap_report.html
  artifacts:
    when: always
    paths:
      - zap_reports/zap_report.html
  allow_failure: true